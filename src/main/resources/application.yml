server:
  port: ${APPLICATION_PORT}

spring:
  application:
    name: auth
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2s
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 3
          max-wait: 2s
